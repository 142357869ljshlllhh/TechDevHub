spring:
  application:
    name: blog-service
  datasource:
    url: jdbc:mysql://localhost:3306/blog
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      port: 6379
      host: localhost
      database: 0
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
server:
  port: 8082
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.techdevhub.user.entity
  configuration:
    map-underscore-to-camel-case: true
techdevhub:
  jwt:
    secret-key: TechDevHubDefaultSecretKeyForJwtAuth2026
    expiration: 86400000
    issuer: techdevhub
    header-name: Authorization
    token-prefix: "Bearer "
    exclude-paths:
      - /swagger-ui/**
      - /v3/api-docs/**