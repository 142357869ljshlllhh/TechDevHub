spring:
  application:
    name: ai-service
  data:
    redis:
      port: 6379
      host: localhost
      database: 0
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  datasource:
    url: jdbc:mysql://localhost:3306/ai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8088

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

techdevhub:
  jwt:
    secret-key: TechDevHubDefaultSecretKeyForJwtAuth2026
    expiration: 86400000
    issuer: techdevhub
    header-name: Authorization
    token-prefix: "Bearer "
    exclude-paths:
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /webjars/**
      - /ai/swagger-ui/**
      - /ai/swagger-ui.html
      - /ai/v3/api-docs/**
  ai:
    memory:
      max-messages: 20

langchain4j:
  open-ai:
    chat-model:
      base-url: ${DASHSCOPE_BASE_URL:${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
      api-key: ${DASHSCOPE_API_KEY:${AI_API_KEY}}
      model-name: ${QWEN_MODEL_NAME:${AI_MODEL_NAME:qwen-plus}}
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: ${DASHSCOPE_BASE_URL:${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
      api-key: ${DASHSCOPE_API_KEY:${AI_API_KEY}}
      model-name: ${QWEN_MODEL_NAME:${AI_MODEL_NAME:qwen-plus}}
      log-requests: true
      log-responses: true
logging:
  level:
    dev.langchain4j: debug
